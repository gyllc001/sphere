services:
  - type: web
    name: sphere-api
    runtime: docker
    # Dockerfile lives at apps/api/Dockerfile but is built from the repo root
    # (it references packages/ and the workspace root package.json)
    dockerfilePath: apps/api/Dockerfile
    startCommand: node drop-schema.js && node dist/db/migrate.js && node dist/index.js
    healthCheckPath: /health
    branch: main
    autoDeploy: true
    plan: free
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres.xlouiwerzpkcjgaiogxl:XSJDQ9Hhgu2IiI7W@aws-0-us-east-1.pooler.supabase.com:6543/postgres
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: ALLOWED_ORIGINS
        value: https://sphere-web-lemon.vercel.app
      # Set these manually in the Render dashboard after first deploy:
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      # Required for admin routes (/api/admin/*). Set in Render dashboard.
      - key: ADMIN_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: sphere-db-admin
    runtime: docker
    dockerfilePath: apps/db-admin/Dockerfile
    # Build context scoped to apps/db-admin/ — Dockerfile only needs index.php
    dockerContext: apps/db-admin
    branch: main
    autoDeploy: true
    plan: free
    envVars:
      # Pre-fills the "Server" field in Adminer's login form
      - key: ADMINER_DEFAULT_SERVER
        fromDatabase:
          name: sphere-db
          property: host
      # HTTP Basic Auth credentials — set these in the Render dashboard
      - key: ADMINER_AUTH_USER
        sync: false
      - key: ADMINER_AUTH_PASS
        sync: false

databases:
  - name: sphere-db
    plan: free
    databaseName: sphere
    user: sphere
