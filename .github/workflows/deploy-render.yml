name: Deploy API to Render

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'render.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}" \
            --fail \
            --max-time 30 \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
