services:
  - type: web
    name: sphere-api
    runtime: docker
    # Dockerfile lives at apps/api/Dockerfile but is built from the repo root
    # (it references packages/ and the workspace root package.json)
    dockerfilePath: apps/api/Dockerfile
    startCommand: node dist/db/migrate.js && node dist/index.js
    healthCheckPath: /health
    branch: main
    autoDeploy: true
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sphere-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: ALLOWED_ORIGINS
        value: https://sphere-web-lemon.vercel.app
      # Set these manually in the Render dashboard after first deploy:
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      # Required for admin routes (/api/admin/*). Set in Render dashboard.
      - key: ADMIN_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: sphere-db
    plan: free
    databaseName: sphere
    user: sphere
